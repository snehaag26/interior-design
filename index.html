<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMIÈRE INTÉRIEUR — Luxury Interior Design Studio</title>
  <meta name="description" content="LUMIÈRE INTÉRIEUR is an elite luxury interior design studio creating gravity-defying, ethereal living spaces. Custom curation, architecture, and luxury.">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,200;1,300&family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500&family=Dancing+Script&display=swap" rel="stylesheet">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React & ReactDOM (Production) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel Standalone (Compiler for JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            plumSmoke: '#6f595b',
            roseLatte: '#e1a2aa',
            dreamyMauve: '#dcacc2',
            cloudyPeach: '#fac7cf',
            whisperCream: '#fcdfd9',
            obsidianBlack: '#0d090a',
          },
          fontFamily: {
            display: ['"Cormorant Garamond"', 'serif'],
            heading: ['"Playfair Display"', 'serif'],
            body: ['"DM Sans"', 'sans-serif'],
            accent: ['"Dancing Script"', 'cursive'],
          }
        }
      }
    }
  </script>

  <!-- Custom Core Styles -->
  <style>
    :root {
      --plum-smoke: #6f595b;
      --rose-latte: #e1a2aa;
      --dreamy-mauve: #dcacc2;
      --cloudy-peach: #fac7cf;
      --whisper-cream: #fcdfd9;
      --obsidian-black: #0c090a;
    }

    body {
      background-color: var(--obsidian-black);
      color: var(--whisper-cream);
      overflow-x: hidden;
      cursor: none; /* Hide default cursor */
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--obsidian-black);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--rose-latte);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--plum-smoke);
    }

    /* Background mesh gradient breathing */
    @keyframes gradient-breath {
      0% { background-position: 0% 50%, 100% 50%, 50% 100%; }
      50% { background-position: 100% 50%, 0% 50%, 50% 0%; }
      100% { background-position: 0% 50%, 100% 50%, 50% 100%; }
    }

    .mesh-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -10;
      background-image: 
        radial-gradient(circle at 15% 25%, rgba(111, 89, 91, 0.5) 0%, transparent 65%),
        radial-gradient(circle at 85% 75%, rgba(220, 172, 194, 0.25) 0%, transparent 65%),
        radial-gradient(circle at 50% 50%, rgba(250, 199, 207, 0.15) 0%, transparent 80%);
      background-size: 200% 200%;
      animation: gradient-breath 20s ease infinite alternate;
    }

    /* Grain Noise Overlay */
    .noise-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 50;
      pointer-events: none;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    /* Floating Keyframes */
    @keyframes float-slow-1 {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(1deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    @keyframes float-slow-2 {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-25px) rotate(-1.5deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    @keyframes float-slow-3 {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(2deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    .float-1 { animation: float-slow-1 7s ease-in-out infinite; }
    .float-2 { animation: float-slow-2 6s ease-in-out infinite; }
    .float-3 { animation: float-slow-3 8s ease-in-out infinite; }

    /* Particles upward drift */
    @keyframes rise {
      0% {
        transform: translateY(0) scale(1);
        opacity: 0;
      }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% {
        transform: translateY(-120vh) scale(0.6);
        opacity: 0;
      }
    }

    /* Orbiting Rotation */
    @keyframes orbit {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes counter-orbit {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }

    .animate-orbit {
      animation: orbit 22s linear infinite;
    }

    .animate-counter-orbit {
      animation: counter-orbit 22s linear infinite;
    }

    /* 3D Wireframe Rotation animation */
    @keyframes rotate-3d-slow {
      0% { transform: rotateX(-15deg) rotateY(0deg); }
      100% { transform: rotateX(-15deg) rotateY(360deg); }
    }

    .animate-rotate-3d {
      animation: rotate-3d-slow 10s linear infinite;
    }

    /* Soft Glow Pulse */
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 15px rgba(225, 162, 170, 0.3); }
      50% { box-shadow: 0 0 35px rgba(225, 162, 170, 0.6); }
    }
    
    .pulse-glow-hover:hover {
      animation: pulse-glow 2s infinite ease-in-out;
    }

    /* Letter fall loader */
    @keyframes letter-fall {
      0% { transform: translateY(-150px); opacity: 0; filter: blur(10px); }
      100% { transform: translateY(0); opacity: 1; filter: blur(0); }
    }

    /* Hide standard cursor everywhere */
    a, button, input, textarea, select {
      cursor: none !important;
    }

    /* Glassmorphism Dark Panel */
    .dark-glass {
      background: rgba(20, 16, 17, 0.45);
      backdrop-filter: blur(25px) saturate(180%);
      border: 1px solid rgba(225, 162, 170, 0.18);
      border-radius: 24px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.45);
    }
  </style>
</head>
<body class="font-body selection:bg-roseLatte/30 selection:text-whisperCream">

  <!-- Grain noise overlay -->
  <div class="noise-overlay"></div>

  <!-- Ambient mesh gradient -->
  <div class="mesh-bg"></div>

  <!-- SVG Morphing Blobs (Background elements) -->
  <div class="fixed inset-0 pointer-events-none z-[-5] overflow-hidden">
    <svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" class="absolute -top-40 -left-40 w-[650px] h-[650px] opacity-20 blur-3xl">
      <path fill="url(#blob-grad-1)">
        <animate attributeName="d" dur="20s" repeatCount="indefinite" values="
          M850,550Q750,750,550,750Q350,750,250,550Q150,350,350,250Q550,150,750,350Q950,350,850,550Z;
          M900,500Q800,700,600,800Q400,900,300,700Q200,500,300,300Q400,100,600,200Q800,300,900,500Z;
          M850,550Q750,750,550,750Q350,750,250,550Q150,350,350,250Q550,150,750,350Q950,350,850,550Z
        "/>
      </path>
      <defs>
        <radialGradient id="blob-grad-1" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#fac7cf" />
          <stop offset="100%" stop-color="transparent" />
        </radialGradient>
      </defs>
    </svg>

    <svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" class="absolute -bottom-40 -right-40 w-[750px] h-[750px] opacity-15 blur-3xl">
      <path fill="url(#blob-grad-2)">
        <animate attributeName="d" dur="24s" repeatCount="indefinite" values="
          M900,500Q800,700,600,800Q400,900,300,700Q200,500,300,300Q400,100,600,200Q800,300,900,500Z;
          M800,600Q700,800,500,800Q300,800,200,600Q100,400,300,300Q500,200,700,300Q900,400,800,600Z;
          M900,500Q800,700,600,800Q400,900,300,700Q200,500,300,300Q400,100,600,200Q800,300,900,500Z
        "/>
      </path>
      <defs>
        <radialGradient id="blob-grad-2" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#dcacc2" stop-opacity="0.8" />
          <stop offset="100%" stop-color="transparent" />
        </radialGradient>
      </defs>
    </svg>
  </div>

  <!-- Root mount element -->
  <div id="root"></div>

  <!-- React Code App -->
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // --- Loading Screen Component ---
    const Loader = ({ onComplete }) => {
      const [progress, setProgress] = useState(0);
      const [opacity, setOpacity] = useState(1);
      const [isVisible, setIsVisible] = useState(true);

      useEffect(() => {
        const interval = setInterval(() => {
          setProgress(prev => {
            if (prev >= 100) {
              clearInterval(interval);
              return 100;
            }
            return prev + Math.floor(Math.random() * 4) + 1;
          });
        }, 50);

        return () => clearInterval(interval);
      }, []);

      useEffect(() => {
        if (progress === 100) {
          const fadeTimer = setTimeout(() => setOpacity(0), 1000);
          const removeTimer = setTimeout(() => {
            setIsVisible(false);
            onComplete();
          }, 2000);
          return () => {
            clearTimeout(fadeTimer);
            clearTimeout(removeTimer);
          };
        }
      }, [progress, onComplete]);

      if (!isVisible) return null;

      const letters = ["L", "U", "M", "I", "È", "R", "E"];

      return (
        <div 
          className="fixed inset-0 bg-obsidianBlack z-[100] flex flex-col justify-center items-center select-none transition-all duration-[1000ms] ease-[cubic-bezier(0.23,1,0.32,1)]"
          style={{ opacity, transform: opacity === 0 ? 'translateY(-100vh)' : 'translateY(0)' }}
        >
          {/* Custom Ambient Glow behind the logo */}
          <div className="absolute w-[350px] h-[350px] bg-roseLatte/15 rounded-full blur-[90px] z-0 animate-pulse"></div>

          <div className="relative z-10 flex gap-3 md:gap-5 mb-8">
            {letters.map((char, index) => (
              <span
                key={index}
                className="font-display text-5xl md:text-8xl tracking-widest text-whisperCream"
                style={{
                  display: 'inline-block',
                  animation: `letter-fall 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards`,
                  animationDelay: `${index * 120}ms`,
                  opacity: 0,
                }}
              >
                {char}
              </span>
            ))}
          </div>

          <div className="relative z-10 w-48 h-[1px] bg-whisperCream/10 mb-2 overflow-hidden">
            <div 
              className="h-full bg-roseLatte transition-all duration-300 ease-out" 
              style={{ width: `${progress}%` }}
            ></div>
          </div>

          <div className="relative z-10 font-heading text-lg tracking-[0.2em] text-roseLatte">
            {progress.toString().padStart(3, '0')}%
          </div>
        </div>
      );
    };

    // --- Particle System Component ---
    const OrbsParticleSystem = () => {
      const particleCount = 65;
      
      const particles = useMemo(() => {
        return Array.from({ length: particleCount }).map((_, i) => {
          const size = Math.random() * 4 + 2;
          const left = Math.random() * 100;
          const delay = Math.random() * 10;
          const duration = Math.random() * 10 + 10;
          const opacity = Math.random() * 0.35 + 0.15;
          return { id: i, size, left, delay, duration, opacity };
        });
      }, []);

      return (
        <div className="absolute inset-0 overflow-hidden pointer-events-none z-0">
          {particles.map(p => (
            <div
              key={p.id}
              className="absolute rounded-full bg-dreamyMauve"
              style={{
                width: `${p.size}px`,
                height: `${p.size}px`,
                left: `${p.left}%`,
                bottom: `-20px`,
                opacity: p.opacity,
                boxShadow: `0 0 10px rgba(220, 172, 194, 0.4)`,
                animation: `rise ${p.duration}s linear infinite`,
                animationDelay: `${p.delay}s`,
              }}
            />
          ))}
        </div>
      );
    };

    // --- Custom Magnetic Cursor & Trail ---
    const CustomCursor = () => {
      const cursorDotRef = useRef(null);
      const canvasRef = useRef(null);
      const trailPoints = useRef([]);
      const mousePos = useRef({ x: 0, y: 0 });
      const cursorPos = useRef({ x: 0, y: 0 });
      const velocity = useRef(0);
      const isHovered = useRef(false);

      useEffect(() => {
        const handleMouseMove = (e) => {
          mousePos.current = { x: e.clientX, y: e.clientY };
        };

        const handleMouseOver = (e) => {
          const target = e.target.closest('[data-cursor="hover"]');
          if (target) {
            isHovered.current = true;
          }
        };

        const handleMouseOut = (e) => {
          const target = e.target.closest('[data-cursor="hover"]');
          if (target) {
            isHovered.current = false;
          }
        };

        window.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('mouseover', handleMouseOver);
        window.addEventListener('mouseout', handleMouseOut);

        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        const resizeCanvas = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        };
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let animationFrameId;

        const render = () => {
          const dx = mousePos.current.x - cursorPos.current.x;
          const dy = mousePos.current.y - cursorPos.current.y;
          
          cursorPos.current.x += dx * 0.15;
          cursorPos.current.y += dy * 0.15;

          const currentVel = Math.sqrt(dx * dx + dy * dy);
          velocity.current += (currentVel - velocity.current) * 0.1;

          trailPoints.current.push({ ...cursorPos.current });
          if (trailPoints.current.length > 25) {
            trailPoints.current.shift();
          }

          ctx.clearRect(0, 0, canvas.width, canvas.height);

          if (trailPoints.current.length > 1) {
            ctx.beginPath();
            ctx.moveTo(trailPoints.current[0].x, trailPoints.current[0].y);

            for (let i = 1; i < trailPoints.current.length - 1; i++) {
              const xc = (trailPoints.current[i].x + trailPoints.current[i + 1].x) / 2;
              const yc = (trailPoints.current[i].y + trailPoints.current[i + 1].y) / 2;
              ctx.quadraticCurveTo(trailPoints.current[i].x, trailPoints.current[i].y, xc, yc);
            }

            ctx.strokeStyle = 'rgba(225, 162, 170, 0.25)';
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#e1a2aa';
            ctx.stroke();
          }

          const dot = cursorDotRef.current;
          if (dot) {
            const baseScale = isHovered.current ? 3.0 : 1.0;
            const angle = Math.atan2(dy, dx);
            const stretch = Math.min(velocity.current * 0.015, 0.8);
            
            dot.style.left = `${cursorPos.current.x}px`;
            dot.style.top = `${cursorPos.current.y}px`;
            
            if (isHovered.current) {
              dot.style.transform = `translate(-50%, -50%) scale(${baseScale})`;
              dot.style.backgroundColor = 'transparent';
              dot.style.border = '1px solid #e1a2aa';
              dot.style.boxShadow = '0 0 15px rgba(225, 162, 170, 0.6)';
            } else {
              dot.style.transform = `translate(-50%, -50%) rotate(${angle}rad) scale(${1 + stretch}, ${1 - stretch})`;
              dot.style.backgroundColor = '#e1a2aa';
              dot.style.border = 'none';
              dot.style.boxShadow = '0 0 8px #e1a2aa';
            }
          }

          animationFrameId = requestAnimationFrame(render);
        };
        render();

        return () => {
          window.removeEventListener('mousemove', handleMouseMove);
          window.removeEventListener('mouseover', handleMouseOver);
          window.removeEventListener('mouseout', handleMouseOut);
          window.removeEventListener('resize', resizeCanvas);
          cancelAnimationFrame(animationFrameId);
        };
      }, []);

      return (
        <>
          <canvas ref={canvasRef} className="fixed inset-0 pointer-events-none z-[80]" />
          <div
            ref={cursorDotRef}
            id="custom-cursor-dot"
            className="fixed w-3 h-3 rounded-full pointer-events-none z-[90] transition-[background-color,border,box-shadow,width,height] duration-300 ease-out"
            style={{ left: 0, top: 0, transform: 'translate(-50%, -50%)' }}
          />
        </>
      );
    };

    // --- Interactive Hover Button ---
    const HoverButton = ({ children, onClick, className = "", style = {} }) => {
      return (
        <button
          onClick={onClick}
          data-cursor="hover"
          className={`relative overflow-hidden group border border-roseLatte/30 hover:border-roseLatte/80 px-6 py-3.5 rounded-full text-whisperCream text-xs uppercase tracking-widest font-body bg-roseLatte/5 backdrop-blur-sm transition-colors duration-500 ${className}`}
          style={style}
        >
          <span className="block transition-transform duration-500 ease-[cubic-bezier(0.23,1,0.32,1)] group-hover:-translate-y-[150%]">
            {children}
          </span>
          <span className="absolute inset-0 flex items-center justify-center transition-transform duration-500 ease-[cubic-bezier(0.23,1,0.32,1)] translate-y-[150%] group-hover:translate-y-0 text-roseLatte font-bold">
            {children}
          </span>
        </button>
      );
    };

    // --- Scroll Reveal Antigravity Wrapper ---
    const ScrollReveal = ({ children, className = "", delay = 0 }) => {
      const ref = useRef(null);
      const [isVisible, setIsVisible] = useState(false);

      useEffect(() => {
        const observer = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting) {
              setIsVisible(true);
              observer.unobserve(entry.target);
            }
          },
          { threshold: 0.1, rootMargin: '0px 0px -50px 0px' }
        );

        if (ref.current) {
          observer.observe(ref.current);
        }

        return () => observer.disconnect();
      }, []);

      return (
        <div
          ref={ref}
          className={`transition-all duration-1000 ease-[cubic-bezier(0.23,1,0.32,1)] ${
            isVisible 
              ? 'opacity-100 translate-y-0 filter blur-0' 
              : 'opacity-0 translate-y-24 filter blur-[2px]'
          } ${className}`}
          style={{ transitionDelay: `${delay}ms` }}
        >
          {children}
        </div>
      );
    };

    // --- Core 3D Box Renderer Component ---
    const CSS3DBox = ({ w, h, d, x, y, z, rx=0, ry=0, rz=0, color='rgba(225,162,170,0.14)', borderColor='#e1a2aa' }) => {
      const halfW = w / 2;
      const halfH = h / 2;
      const halfD = d / 2;
      
      return (
        <div 
          className="absolute"
          style={{
            width: `${w}px`,
            height: `${h}px`,
            left: `${x}px`,
            top: `${y}px`,
            transformStyle: 'preserve-3d',
            transform: `translate3d(0,0,${z}px) rotateX(${rx}deg) rotateY(${ry}deg) rotateZ(${rz}deg)`
          }}
        >
          {/* Front Face */}
          <div className="absolute inset-0 border border-current" style={{ color: borderColor, backgroundColor: color, transform: `translateZ(${halfD}px)` }} />
          
          {/* Back Face */}
          <div className="absolute inset-0 border border-current" style={{ color: borderColor, backgroundColor: color, transform: `rotateY(180deg) translateZ(${halfD}px)` }} />
          
          {/* Left Face */}
          <div className="absolute top-0 bottom-0 border border-current" style={{ color: borderColor, backgroundColor: color, left: `${halfW - halfD}px`, width: `${d}px`, transform: `rotateY(-90deg) translateZ(${halfW}px)` }} />
          
          {/* Right Face */}
          <div className="absolute top-0 bottom-0 border border-current" style={{ color: borderColor, backgroundColor: color, left: `${halfW - halfD}px`, width: `${d}px`, transform: `rotateY(90deg) translateZ(${halfW}px)` }} />
          
          {/* Top Face */}
          <div className="absolute left-0 right-0 border border-current" style={{ color: borderColor, backgroundColor: color, top: `${halfH - halfD}px`, height: `${d}px`, transform: `rotateX(90deg) translateZ(${halfH}px)` }} />
          
          {/* Bottom Face */}
          <div className="absolute left-0 right-0 border border-current" style={{ color: borderColor, backgroundColor: color, top: `${halfH - halfD}px`, height: `${d}px`, transform: `rotateX(-90deg) translateZ(${halfH}px)` }} />
        </div>
      );
    };

    // --- Interactive 3D Room Mockup (Hero) ---
    const Interactive3DRoom = () => {
      const [tilt, setTilt] = useState({ x: -18, y: 38 });
      const containerRef = useRef(null);

      const handleMouseMove = (e) => {
        const container = containerRef.current;
        if (!container) return;

        const rect = container.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const width = rect.width;
        const height = rect.height;

        const px = (x / width) * 2 - 1;
        const py = (y / height) * 2 - 1;

        const baseX = -18;
        const baseY = 38;

        setTilt({
          x: baseX + py * 15,
          y: baseY + px * 15
        });
      };

      const handleMouseLeave = () => {
        setTilt({ x: -18, y: 38 });
      };

      return (
        <div 
          ref={containerRef}
          onMouseMove={handleMouseMove}
          onMouseLeave={handleMouseLeave}
          className="relative w-full h-[400px] md:h-[550px] flex items-center justify-center select-none"
          style={{ perspective: '1200px' }}
        >
          <div 
            className="relative w-[280px] h-[280px] md:w-[400px] md:h-[400px] transition-transform duration-500 ease-[cubic-bezier(0.23,1,0.32,1)]"
            style={{ 
              transformStyle: 'preserve-3d',
              transform: `rotateX(${tilt.x}deg) rotateY(${tilt.y}deg)`
            }}
          >
            {/* Room Floor Plane */}
            <div 
              className="absolute inset-0 border border-roseLatte/15 origin-bottom" 
              style={{ 
                transform: 'rotateX(90deg) translateZ(-200px)', 
                background: 'radial-gradient(circle, rgba(225,162,170,0.15) 0%, rgba(12,9,10,0.85) 100%)',
                boxShadow: 'inset 0 0 30px rgba(225, 162, 170, 0.1)'
              }}
            >
              <div className="w-full h-full grid grid-cols-5 grid-rows-5 opacity-20 pointer-events-none">
                {Array.from({ length: 25 }).map((_, i) => (
                  <div key={i} className="border border-roseLatte/30" />
                ))}
              </div>
            </div>

            {/* Back Wall Plane */}
            <div 
              className="absolute inset-0 border border-roseLatte/15" 
              style={{ 
                transform: 'translateZ(-200px)',

        const card = cardRef.current;
        if (!card) return;

        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const width = rect.width;
        const height = rect.height;

        const px = (x / width) * 2 - 1;
        const py = (y / height) * 2 - 1;

        const tiltX = -py * 14;
        const tiltY = px * 14;

        setTilt({ x: px * 12, y: py * 12 });

        card.style.transform = `perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale3d(1.03, 1.03, 1.03)`;
        card.style.boxShadow = `0 35px 65px rgba(0, 0, 0, 0.7)`;

        if (badgeRef.current) badgeRef.current.style.transform = `translateZ(40px) translateX(${px * 5}px) translateY(${py * 5}px)`;
        if (borderRef.current) borderRef.current.style.transform = `translateZ(20px)`;
        
        const highlight = highlightRef.current;
        if (highlight) {

        const card = cardRef.current;

    // --- Number Counter Component ---
    const CountingNumber = ({ value, label }) => {
      const [count, setCount] = useState(0);
      const ref = useRef(null);

      useEffect(() => {
        const target = parseInt(value);
        let start = 0;
        let isTriggered = false;

        const observer = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting && !isTriggered) {
            isTriggered = true;
            const duration = 2000;
            const stepTime = Math.abs(Math.floor(duration / target));
            
            const timer = setInterval(() => {
              start += 1;
              setCount(start);
              if (start >= target) {
                clearInterval(timer);
                setCount(target);
              }
            }, stepTime);
          }
        }, { threshold: 0.5 });

        if (ref.current) {
          observer.observe(ref.current);
        }

        return () => observer.disconnect();
      }, [value]);

      return (
        <div ref={ref} className="text-center">
          <span className="font-heading text-4xl md:text-5xl text-whisperCream block mb-1">

                <p className="text-xs font-light text-whisperCream/70 leading-relaxed font-body">
                  Paris, Cloud District<br />
                  aura@lumiereinterieur.design<br />
                  +33 (0) 1 45 78 89 90
                </p>
              </div>

              <div className="space-y-4">
                <h4 className="font-heading text-sm text-whisperCream mb-4">Orbits</h4>
                <div className="flex gap-4">
                  {socialLinks.map((social, i) => (
                    <a
                      key={i}
                      href={social.url}
                      data-cursor="hover"
                      className="w-10 h-10 rounded-full border border-roseLatte/20 bg-roseLatte/5 flex items-center justify-center text-xs font-body text-whisperCream hover:text-roseLatte hover:border-roseLatte hover:shadow-lg transition-colors float-1"
                      style={{ animationDelay: social.delay, animationDuration: '4.5s' }}
                    >
                      {social.label}
                    </a>
                  ))}
                </div>
              </div>

            </div>
          </ScrollReveal>

          <div className="relative select-none pointer-events-none mt-8 -mb-16 md:-mb-24 overflow-hidden">
            <h2 className="font-display text-[12vw] text-center tracking-[0.15em] text-whisperCream/5 uppercase whitespace-nowrap leading-none select-none">
              LUMIÈRE INTÉRIEUR
            </h2>
          </div>

          <div className="max-w-6xl mx-auto px-4 mt-8 pt-8 border-t border-roseLatte/5 flex flex-col md:flex-row justify-between items-center text-[10px] text-whisperCream/30 font-body">
            <span>© 2026 LUMIÈRE INTÉRIEUR. All retreats suspended.</span>
            <span className="mt-2 md:mt-0">GenZ luxury meets classic weightlessness.</span>
          </div>
        </footer>
      );
    };

    // --- MAIN APP COMPONENT ---
    const App = () => {
      const [loading, setLoading] = useState(true);
      const [currentTab, setCurrentTab] = useState('home');
      const [renderTab, setRenderTab] = useState('home');
      const [transitionState, setTransitionState] = useState('entered');

      useEffect(() => {
        const handleHashChange = () => {
          const hash = window.location.hash.replace('#', '') || 'home';
          const validTabs = ['home', 'portfolio', 'services', 'about', 'contact'];
          if (validTabs.includes(hash)) {
            setCurrentTab(hash);
          }
        };
        
        window.addEventListener('hashchange', handleHashChange);
        handleHashChange();
        
        return () => window.removeEventListener('hashchange', handleHashChange);
      }, []);

      const navigateTo = (tabId) => {
        window.location.hash = `#${tabId}`;
      };

      useEffect(() => {
        if (currentTab !== renderTab) {
          setTransitionState('exiting');
          
          const exitTimer = setTimeout(() => {
            setRenderTab(currentTab);
            window.scrollTo({ top: 0, behavior: 'instant' });
            setTransitionState('entering');
            
            const enterTimer = setTimeout(() => {
              setTransitionState('entered');
            }, 60);
            
            return () => clearTimeout(enterTimer);
          }, 600);
          
          return () => clearTimeout(exitTimer);
        }
      }, [currentTab, renderTab]);

      return (
        <div className="min-h-screen flex flex-col relative">
          <CustomCursor />
          <Loader onComplete={() => setLoading(false)} />

          {!loading && (
            <>
              <Navigation activeTab={currentTab} onTabChange={navigateTo} />

              <main 
                className="flex-grow pt-16 transition-all duration-[600ms] ease-[cubic-bezier(0.23,1,0.32,1)]"
                style={{
                  opacity: transitionState === 'entered' ? 1 : 0,
                  transform: transitionState === 'entered' 
                    ? 'translateY(0) scale(1)' 
                    : transitionState === 'exiting' 
                      ? 'translateY(-60px) scale(0.97)' 
                      : 'translateY(60px) scale(0.97)',
                  filter: transitionState === 'entered' ? 'blur(0)' : 'blur(4px)',
                }}
              >
                {renderTab === 'home' && <HomePage onNavigate={navigateTo} />}
                {renderTab === 'portfolio' && <PortfolioPage />}
                {renderTab === 'services' && <ServicesPage />}
                {renderTab === 'about' && <AboutPage />}
                {renderTab === 'contact' && <ContactPage />}
              </main>

              <Footer onNavigate={navigateTo} />
            </>
          )}
        </div>
      );
    };

    const rootEl = document.getElementById('root');
    const root = ReactDOM.createRoot(rootEl);
    root.render(<App />);
  </script>
</body>
</html>
